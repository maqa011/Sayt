<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7b Söhbət Qrupu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif; 
            background-color: #e5ddd5; /* WhatsApp arxa fon rəngi */
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); /* WhatsApp naxışı */
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
        }

        header {
            background: #075e54;
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .header-info h2 { font-size: 18px; }
        .header-info p { font-size: 12px; opacity: 0.8; }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        /* Mesaj Stili */
        .message-wrapper { display: flex; align-items: flex-end; gap: 8px; margin-bottom: 5px; }
        .my-message-wrapper { flex-direction: row-reverse; }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .message { 
            padding: 8px 12px; 
            border-radius: 10px; 
            max-width: 70%; 
            position: relative;
            font-size: 15px;
            line-height: 1.4;
            box-shadow: 0 1px 1px rgba(0,0,0,0.1);
        }

        .received { background: white; border-top-left-radius: 0; }
        .sent { background: #dcf8c6; border-top-right-radius: 0; }

        .user-name { font-weight: bold; color: #27ae60; font-size: 12px; display: block; margin-bottom: 2px; }
        .timestamp { font-size: 10px; color: #888; text-align: right; margin-top: 4px; }

        /* Giriş və Mesaj Yazma Yeri */
        #input-area { background: #f0f0f0; padding: 10px 15px; display: flex; gap: 10px; align-items: center; }
        
        input { 
            flex: 1; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 25px; 
            outline: none; 
            font-size: 15px;
        }

        button { 
            background: #075e54; 
            color: white; 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        button:hover { transform: scale(1.05); background: #128c7e; }

        /* Ad Təyin Etmə Modalı */
        #name-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center;
            justify-content: center; z-index: 100;
        }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 300px; }
        .modal-content input { border: 1px solid #ddd; margin: 15px 0; width: 100%; }
        .modal-content button { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>

<div id="name-modal">
    <div class="modal-content">
        <h3>Xoş gəlmisiniz!</h3>
        <p>Çatda görünəcək adınızı daxil edin:</p>
        <input type="text" id="nameInput" placeholder="Adınız...">
        <button onclick="saveName()">Giriş Et</button>
    </div>
</div>

<header>
    <div class="avatar" style="background: #128c7e;">C</div>
    <div class="header-info">
        <h2>Ümumi Qrup</h2>
        <p>online...</p>
    </div>
</header>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="msgInput" placeholder="Mesaj yazın..." autocomplete="off">
    <button onclick="sendMessage()">➤</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCoV-OntqQIdsNofRa5YECC2Qc5gPyonKU",
    authDomain: "sayt-df53b.firebaseapp.com",
    databaseURL: "https://sayt-df53b-default-rtdb.firebaseio.com",
    projectId: "sayt-df53b",
    storageBucket: "sayt-df53b.firebasestorage.app",
    messagingSenderId: "856088731383",
    appId: "1:856088731383:web:fc64764c6a34458e337df2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  let userName = localStorage.getItem('chat_user_name');

  if (userName) {
      document.getElementById('name-modal').style.display = 'none';
  }

  window.saveName = function() {
      const name = document.getElementById('nameInput').value.trim();
      if (name) {
          localStorage.setItem('chat_user_name', name);
          userName = name;
          document.getElementById('name-modal').style.display = 'none';
      }
  }

  window.sendMessage = function() {
      const input = document.getElementById('msgInput');
      if (input.value.trim() !== "") {
          push(messagesRef, {
              user: userName,
              text: input.value,
              time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
          });
          input.value = "";
      }
  }

  function getRandomColor() {
      const colors = ['#e67e22', '#2ecc71', '#e74c3c', '#3498db', '#9b59b6', '#f1c40f'];
      return colors[Math.floor(Math.random() * colors.length)];
  }

  onChildAdded(messagesRef, (data) => {
      const msg = data.val();
      const container = document.getElementById('chat-container');
      
      const isMe = msg.user === userName;
      const wrapper = document.createElement('div');
      wrapper.className = `message-wrapper ${isMe ? 'my-message-wrapper' : ''}`;
      
      const initial = msg.user ? msg.user.charAt(0) : "U";
      const color = getRandomColor();

      wrapper.innerHTML = `
          <div class="avatar" style="background: ${color}">${initial}</div>
          <div class="message ${isMe ? 'sent' : 'received'}">
              ${!isMe ? `<span class="user-name">${msg.user}</span>` : ''}
              <div class="text">${msg.text}</div>
              <div class="timestamp">${msg.time || ''}</div>
          </div>
      `;
      
      container.appendChild(wrapper);
      container.scrollTop = container.scrollHeight;
  });

  document.getElementById('msgInput').addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
