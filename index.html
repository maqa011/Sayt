<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qafqaz Chat</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #e6eee0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            margin: 0; 
        }
        header {
            background: #24292e;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }
        .message { 
            background: white; 
            padding: 10px 15px; 
            border-radius: 15px; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            max-width: 85%; 
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .user-name { 
            font-weight: bold; 
            color: #2c3e50; 
            font-size: 0.75em; 
            margin-bottom: 3px; 
            display: block;
        }
        .text { color: #333; line-height: 1.4; word-wrap: break-word; }
        
        #input-area { 
            background: white; 
            padding: 15px; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #ddd;
            align-items: center;
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 25px; 
            outline: none; 
            font-size: 16px;
        }
        input:focus { border-color: #24292e; }
        button { 
            padding: 10px 20px; 
            background: #24292e; 
            color: white; 
            border: none; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #444; }
    </style>
</head>
<body>

<header>Ümumi Çat</header>

<div id="chat-container"></div>

<div id="input-area">
    <input type="text" id="msgInput" placeholder="Mesaj yazın..." autocomplete="off">
    <button onclick="sendMessage()">Göndər</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // Sənin Firebase Məlumatların
  const firebaseConfig = {
    apiKey: "AIzaSyCoV-OntqQIdsNofRa5YECC2Qc5gPyonKU",
    authDomain: "sayt-df53b.firebaseapp.com",
    databaseURL: "https://sayt-df53b-default-rtdb.firebaseio.com",
    projectId: "sayt-df53b",
    storageBucket: "sayt-df53b.firebasestorage.app",
    messagingSenderId: "856088731383",
    appId: "1:856088731383:web:fc64764c6a34458e337df2",
    measurementId: "G-FB3KC9T0C2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'messages');

  // İstifadəçi adını təyin et
  let userId = localStorage.getItem('chat_user_id');
  if (!userId) {
      userId = "User" + Math.floor(Math.random() * 9000 + 1000);
      localStorage.setItem('chat_user_id', userId);
  }

  // Mesaj göndərmək
  window.sendMessage = function() {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (text !== "") {
          push(messagesRef, {
              user: userId,
              text: text,
              timestamp: serverTimestamp()
          });
          input.value = "";
      }
  }

  // Mesajları göstərmək
  onChildAdded(messagesRef, (data) => {
      const msg = data.val();
      const container = document.getElementById('chat-container');
      const div = document.createElement('div');
      div.className = 'message';
      
      // Əgər mesajı biz yazmışıqsa, sağa yasla (istəyə bağlı dizayn)
      if(msg.user === userId) {
          div.style.alignSelf = 'flex-end';
          div.style.background = '#dcf8c6';
      }

      div.innerHTML = `<span class="user-name">${msg.user}</span><div class="text">${escapeHtml(msg.text)}</div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
  });

  // Təhlükəsizlik üçün HTML təmizləmə
  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  document.getElementById('msgInput').addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
